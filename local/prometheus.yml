  - job_name: notification-service
    static_configs:
      - targets: ["notification-service:3000"]

  - job_name: search-service
    static_configs:
      - targets: ["search-service:3000"]

  - job_name: recommendation-service
    static_configs:
      - targets: ["recommendation-service:3000"]

  - job_name: review-service
    static_configs:

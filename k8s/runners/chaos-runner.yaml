apiVersion: v1
kind: ServiceAccount
metadata:
  name: chaos-runner
  namespace: demo
---
# RBAC for chaos runner — only what it needs, nothing more
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: chaos-runner
  namespace: demo
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "patch"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: chaos-runner
  namespace: demo
subjects:
  - kind: ServiceAccount
    name: chaos-runner
    namespace: demo
roleRef:
  kind: Role
  name: chaos-runner
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chaos-runner
  namespace: demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chaos-runner
  template:
    metadata:
      labels:
        app: chaos-runner
    spec:
      serviceAccountName: chaos-runner
      containers:
        - name: chaos-runner
          image: ${ECR_REGISTRY}/anvay-demo/chaos-runner:${IMAGE_TAG}
          env:
            - name: K8S_NAMESPACE
              value: demo
            - name: CHAOS_INTENSITY
              value: "0.3"
            - name: CHAOS_INTERVAL_MS
              value: "30000"
          resources:
            requests:
              cpu: 20m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi

# Loki stack helm values
# Deploy: helm upgrade --install loki grafana/loki-stack -n observability -f values.yaml

loki:
  enabled: true
  persistence:
    enabled: true
    size: 20Gi
    storageClassName: gp2
  config:
    auth_enabled: false
    server:
      http_listen_port: 3100
    ingester:
      lifecycler:
        ring:
          kvstore:
            store: inmemory
          replication_factor: 1
    schema_config:
      configs:
        - from: 2020-10-24
          store: boltdb-shipper
          object_store: filesystem
          schema: v11
          index:
            prefix: index_
            period: 24h
    limits_config:
      reject_old_samples: false
      reject_old_samples_max_age: 168h
      retention_period: 336h

promtail:
  enabled: true
  config:
    logLevel: info
    serverPort: 3101
    clients:
      - url: http://loki:3100/loki/api/v1/push
    snippets:
      pipelineStages:
        - json:
            expressions:
              time: time
              service: service
              level: level
              msg: msg
        - labels:
            service:
            level:
        - timestamp:
            source: time
            format: RFC3339Nano

apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: observability
  labels:
    grafana_dashboard: "1"
data:
  demo-services.json: |
    {
      "title": "Demo Services Overview",
      "uid": "demo-overview",
      "schemaVersion": 38,
      "panels": [
        {
          "type": "stat",
          "title": "Total RPS",
          "gridPos": {"x":0,"y":0,"w":6,"h":4},
          "targets": [{"expr": "sum(rate(http_requests_total{namespace=\"demo\"}[1m]))","legendFormat": "RPS"}],
          "fieldConfig": {"defaults": {"color": {"mode": "thresholds"}, "thresholds": {"steps": [{"color":"green","value":0},{"color":"yellow","value":100},{"color":"red","value":500}]}}}
        },
        {
          "type": "stat",
          "title": "Error Rate %",
          "gridPos": {"x":6,"y":0,"w":6,"h":4},
          "targets": [{"expr": "100 * sum(rate(http_requests_total{namespace=\"demo\",status=~\"5..\"}[1m])) / sum(rate(http_requests_total{namespace=\"demo\"}[1m]))","legendFormat": "Error %"}],
          "fieldConfig": {"defaults": {"unit": "percent", "thresholds": {"steps": [{"color":"green","value":0},{"color":"yellow","value":1},{"color":"red","value":5}]}}}
        },
        {
          "type": "timeseries",
          "title": "Request Rate per Service",
          "gridPos": {"x":0,"y":4,"w":24,"h":8},
          "targets": [{"expr": "sum by (service) (rate(http_requests_total{namespace=\"demo\"}[1m]))","legendFormat": "{{service}}"}]
        },
        {
          "type": "timeseries",
          "title": "P95 Latency per Service",
          "gridPos": {"x":0,"y":12,"w":24,"h":8},
          "targets": [{"expr": "histogram_quantile(0.95, sum by (service, le) (rate(http_request_duration_seconds_bucket{namespace=\"demo\"}[1m])))","legendFormat": "p95 {{service}}"}],
          "fieldConfig": {"defaults": {"unit": "s"}}
        },
        {
          "type": "timeseries",
          "title": "Pod Restarts",
          "gridPos": {"x":0,"y":20,"w":12,"h":6},
          "targets": [{"expr": "increase(kube_pod_container_status_restarts_total{namespace=\"demo\"}[5m])","legendFormat": "{{pod}}"}]
        },
        {
          "type": "timeseries",
          "title": "Orders Created / min",
          "gridPos": {"x":12,"y":20,"w":12,"h":6},
          "targets": [{"expr": "rate(orders_created_total{namespace=\"demo\"}[1m]) * 60","legendFormat": "orders/min"}]
        }
      ],
      "time": {"from": "now-1h","to": "now"},
      "refresh": "10s"
    }

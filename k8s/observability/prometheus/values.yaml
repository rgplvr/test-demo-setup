# kube-prometheus-stack helm values
# Deploy: helm upgrade --install kube-prometheus-stack prometheus-community/kube-prometheus-stack -n observability -f values.yaml

prometheus:
  prometheusSpec:
    retention: 15d
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: gp2
          accessModes: [ReadWriteOnce]
          resources:
            requests:
              storage: 20Gi
    additionalScrapeConfigs:
      - job_name: demo-services
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [demo]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - source_labels: [__meta_kubernetes_pod_label_app]
            target_label: service

alertmanager:
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: gp2
          resources:
            requests:
              storage: 5Gi
  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: [alertname, service]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: anvay-webhook
    receivers:
      - name: anvay-webhook
        webhook_configs:
          - url: "${ANVAY_WEBHOOK_URL}"  # set by deploy script from env
            send_resolved: true

grafana:
  adminPassword: "${GRAFANA_ADMIN_PASSWORD}"  # set by deploy script from env
  persistence:
    enabled: true
    size: 5Gi
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: demo
          orgId: 1
          folder: Demo
          type: file
          disableDeletion: false
          options:
            path: /var/lib/grafana/dashboards/demo
  dashboardsConfigMaps:
    demo: grafana-dashboards

defaultRules:
  create: true
  rules:
    alertmanager: true
    etcd: true
    general: true
    kubernetesApps: true
    kubernetesResources: true
    node: true
    prometheus: true

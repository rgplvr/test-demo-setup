# Secrets injected via AWS Secrets Manager + External Secrets Operator
# Install ESO: helm install external-secrets external-secrets/external-secrets -n kube-system
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secrets
  namespace: demo
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1  # overridden by deploy script
      auth:
        jwt:
          serviceAccountRef:
            name: demo-services
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: app-secrets
  namespace: demo
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: aws-secrets
    kind: SecretStore
  target:
    name: app-secrets
    creationPolicy: Owner
  data:
    - secretKey: JWT_SECRET
      remoteRef:
        key: /anvay-demo/jwt-secret
    - secretKey: DATABASE_URL
      remoteRef:
        key: /anvay-demo/db-url
